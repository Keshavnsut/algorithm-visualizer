<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1b2b"/>
      <stop offset="1" stop-color="#173a55"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#112b40"/>
      <stop offset="1" stop-color="#1f4d70"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ed8ff"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="640" rx="24" fill="url(#bg)"/>

  <text x="60" y="74" fill="#d8edff" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Deployment Architecture</text>
  <text x="60" y="104" fill="#9dc9ea" font-size="18" font-family="Segoe UI, Arial, sans-serif">Single-service Render deployment with frontend and backend on one domain</text>

  <g filter="url(#shadow)">
    <rect x="70" y="176" width="220" height="110" rx="16" fill="url(#card)" stroke="#5c93b9"/>
    <text x="104" y="226" fill="#e8f6ff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">User Browser</text>
    <text x="116" y="252" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">https://your-app.onrender.com</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="138" width="430" height="420" rx="20" fill="url(#card)" stroke="#78b8e3"/>
    <text x="540" y="178" fill="#eaf7ff" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Render Web Service</text>
    <text x="500" y="206" fill="#b7dbf4" font-size="16" font-family="Segoe UI, Arial, sans-serif">Docker container (single domain)</text>

    <rect x="430" y="248" width="350" height="118" rx="14" fill="#123149" stroke="#5ca4d1"/>
    <text x="492" y="288" fill="#dff3ff" font-size="23" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Static Frontend</text>
    <text x="468" y="314" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">React + Vite build served at /</text>
    <text x="500" y="338" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">SPA fallback routing</text>

    <rect x="430" y="392" width="350" height="124" rx="14" fill="#123149" stroke="#5ca4d1"/>
    <text x="520" y="434" fill="#dff3ff" font-size="23" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Express API</text>
    <text x="460" y="460" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">AI routes at /api/ai/*</text>
    <text x="492" y="484" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">Health endpoint: /health</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="196" width="240" height="110" rx="16" fill="url(#card)" stroke="#5c93b9"/>
    <text x="968" y="244" fill="#e8f6ff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">SQLite</text>
    <text x="938" y="270" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">/tmp/ai.db (free tier)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="356" width="240" height="110" rx="16" fill="url(#card)" stroke="#5c93b9"/>
    <text x="922" y="404" fill="#e8f6ff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">AI Provider</text>
    <text x="966" y="430" fill="#b9ddf7" font-size="16" font-family="Segoe UI, Arial, sans-serif">OpenAI / Groq</text>
  </g>

  <line x1="290" y1="231" x2="390" y2="231" stroke="#9ed8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="820" y1="454" x2="900" y2="411" stroke="#9ed8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="820" y1="452" x2="900" y2="250" stroke="#9ed8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="900" y1="250" x2="820" y2="420" stroke="#6ec7ff" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <line x1="900" y1="411" x2="820" y2="450" stroke="#6ec7ff" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow)"/>

  <rect x="60" y="566" width="1080" height="42" rx="10" fill="url(#accent)" opacity="0.2"/>
  <text x="85" y="592" fill="#d7efff" font-size="17" font-family="Segoe UI, Arial, sans-serif">Request flow: Browser -> Render service -> Express API -> SQLite + AI Provider</text>
</svg>
